<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products — Atelier</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/products.css" />
    <link rel="stylesheet" href="./css/responsive.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-shell">
        <a class="brand" href="./index.html" aria-label="Atelier home">
          <img src="./assets/logo/logo.svg" alt="Atelier logo" />
          <span>Atelier</span>
        </a>
        <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">☰</button>
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="./index.html">Home</a>
          <a href="./products.html" class="active">Products</a>
          <a href="./wishlist.html">Wishlist</a>
          <a href="./cart.html">Cart</a>
          <a href="./checkout.html">Checkout</a>
        </nav>
        <div class="nav-actions">
          <div class="search-box">
            <input id="globalSearch" type="search" placeholder="Search products" aria-label="Search products" />
            <button id="searchButton" type="button" aria-label="Search">⌕</button>
          </div>
          <button id="themeToggle" class="icon-button" aria-label="Toggle dark mode">☀️</button>
          <a href="./wishlist.html" class="icon-button" aria-label="Wishlist">♡</a>
          <a href="./cart.html" class="icon-button cart-link" aria-label="Cart">
            🛍️
            <span id="cartCount" class="count-badge">0</span>
          </a>
        </div>
      </div>
    </header>

    <main class="page-shell">
      <div class="container products-layout">
        <aside class="filters-panel" aria-label="Product filters">
          <div class="filter-block">
            <h3>Search</h3>
            <input id="productSearch" type="search" placeholder="Search title, brand, or category" />
          </div>
          <div class="filter-block">
            <h3>Category</h3>
            <select id="categoryFilter">
              <option value="">All categories</option>
            </select>
          </div>
          <div class="filter-block">
            <h3>Rating</h3>
            <select id="ratingFilter">
              <option value="">Any rating</option>
              <option value="4">4+ stars</option>
              <option value="4.5">4.5+ stars</option>
            </select>
          </div>
          <div class="filter-block">
            <h3>Availability</h3>
            <select id="availabilityFilter">
              <option value="">Any stock</option>
              <option value="inStock">In stock</option>
              <option value="lowStock">Low stock</option>
            </select>
          </div>
          <div class="filter-block">
            <h3>Discount</h3>
            <select id="discountFilter">
              <option value="">Any discount</option>
              <option value="10">10%+</option>
              <option value="20">20%+</option>
              <option value="30">30%+</option>
            </select>
          </div>
          <div class="filter-block">
            <h3>Price range</h3>
            <input id="priceRange" type="range" min="0" max="2000" step="50" value="2000" />
            <p class="range-value">Up to ₹<span id="rangeValue">2000</span></p>
          </div>
          <div class="filter-block">
            <h3>Brand</h3>
            <select id="brandFilter">
              <option value="">All brands</option>
            </select>
          </div>
          <button id="resetFilters" class="btn btn-secondary full-width">Reset filters</button>
        </aside>

        <section class="products-panel">
          <div class="products-toolbar">
            <div>
              <p class="eyebrow">Curated collection</p>
              <h1>Discover premium products.</h1>
            </div>
            <div class="toolbar-actions">
              <select id="sortSelect" aria-label="Sort products">
                <option value="featured">Featured</option>
                <option value="newest">Newest</option>
                <option value="priceAsc">Price: Low to High</option>
                <option value="priceDesc">Price: High to Low</option>
                <option value="rating">Highest Rated</option>
                <option value="popular">Popular</option>
              </select>
            </div>
          </div>
          <div id="productsGrid" class="product-grid"></div>
          <div id="pagination" class="pagination"></div>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-shell">
        <div>
          <a class="brand footer-brand" href="./index.html">
            <img src="./assets/logo/logo.svg" alt="Atelier logo" />
            <span>Atelier</span>
          </a>
          <p>Minimal luxury for modern living.</p>
        </div>
      </div>
    </footer>

    <button id="scrollTop" class="scroll-top" aria-label="Scroll to top">↑</button>
    <div id="toastContainer" class="toast-container" aria-live="polite"></div>

    <script type="module" src="./js/app.js"></script>
    <script type="module" src="./js/search.js"></script>
    <script type="module" src="./js/products.js"></script>
  </body>
</html>
