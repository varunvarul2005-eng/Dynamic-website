<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout — Atelier</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/checkout.css" />
    <link rel="stylesheet" href="./css/responsive.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-shell">
        <a class="brand" href="./index.html" aria-label="Atelier home">
          <img src="./assets/logo/logo.svg" alt="Atelier logo" />
          <span>Atelier</span>
        </a>
        <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">☰</button>
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="./index.html">Home</a>
          <a href="./products.html">Products</a>
          <a href="./wishlist.html">Wishlist</a>
          <a href="./cart.html">Cart</a>
          <a href="./checkout.html" class="active">Checkout</a>
        </nav>
        <div class="nav-actions">
          <div class="search-box">
            <input id="globalSearch" type="search" placeholder="Search products" aria-label="Search products" />
            <button id="searchButton" type="button" aria-label="Search">⌕</button>
          </div>
          <button id="themeToggle" class="icon-button" aria-label="Toggle dark mode">☀️</button>
          <a href="./wishlist.html" class="icon-button" aria-label="Wishlist">♡</a>
          <a href="./cart.html" class="icon-button cart-link" aria-label="Cart">
            🛍️
            <span id="cartCount" class="count-badge">0</span>
          </a>
        </div>
      </div>
    </header>

    <main class="page-shell">
      <div class="container checkout-layout">
        <section class="checkout-form-section">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Secure checkout</p>
              <h1>Checkout</h1>
            </div>
          </div>
          <form id="checkoutForm" class="checkout-form">
            <div class="form-grid">
              <label>
                Name
                <input name="name" required />
              </label>
              <label>
                Phone
                <input name="phone" required />
              </label>
              <label>
                Email
                <input name="email" required type="email" />
              </label>
              <label>
                Address
                <input name="address" required />
              </label>
              <label>
                City
                <input name="city" required />
              </label>
              <label>
                State
                <input name="state" required />
              </label>
              <label>
                ZIP
                <input name="zip" required />
              </label>
            </div>
            <fieldset>
              <legend>Payment method</legend>
              <label><input type="radio" name="payment" value="Card" checked /> Card</label>
              <label><input type="radio" name="payment" value="PayPal" /> PayPal</label>
              <label><input type="radio" name="payment" value="Apple Pay" /> Apple Pay</label>
            </fieldset>
            <button class="btn btn-primary full-width" type="submit">Place order</button>
          </form>
        </section>
        <aside class="summary-card">
          <h2>Order summary</h2>
          <div id="checkoutSummary" class="checkout-summary"></div>
        </aside>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-shell">
        <div>
          <a class="brand footer-brand" href="./index.html">
            <img src="./assets/logo/logo.svg" alt="Atelier logo" />
            <span>Atelier</span>
          </a>
          <p>Minimal luxury for modern living.</p>
        </div>
      </div>
    </footer>

    <button id="scrollTop" class="scroll-top" aria-label="Scroll to top">↑</button>
    <div id="toastContainer" class="toast-container" aria-live="polite"></div>

    <script type="module" src="./js/app.js"></script>
    <script type="module" src="./js/search.js"></script>
    <script type="module" src="./js/checkout.js"></script>
  </body>
</html>
